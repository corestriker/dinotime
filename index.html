<!doctype html>
  <html lang="en">
    <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>DinoTime – Prehistoric Life Timeline</title>
    <meta name="description" content="Explore 11,000+ prehistoric species across 323 million years. Filter dinosaurs and reptiles by time period, discover fossil locations on an interactive map." />
    <meta name="keywords" content="dinosaurs, prehistoric, paleontology, fossils, timeline, Cretaceous, Jurassic, Triassic, reptiles" />
    <meta name="author" content="DinoTime" />

    <!-- Open Graph – für Social Media Vorschau -->
    <meta property="og:title" content="DinoTime – Prehistoric Life Timeline" />
    <meta property="og:description" content="Explore 11,000+ prehistoric species across 323 million years." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://DEIN-USERNAME.github.io/dinotime/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="DinoTime – Prehistoric Life Timeline" />
    <meta name="twitter:description" content="Explore 11,000+ prehistoric species across 323 million years." />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://DEIN-USERNAME.github.io/dinotime/" />

    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "DinoTime",
      "description": "Interactive prehistoric life timeline with 11,000+ species across 323 million years",
      "url": "https://corestriker.github.io/dinotime/",
      "applicationCategory": "EducationApplication",
      "about": {
        "@type": "Thing",
        "name": "Paleontology",
        "description": "The study of prehistoric life through fossil records"
      },
      "keywords": "dinosaurs, paleontology, prehistoric, fossils, timeline",
      "inLanguage": "en",
      "isAccessibleForFree": true
    }
    </script>
  </body>
</html>
